version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./eval/results:/app/eval/results
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: python -m src.pipeline worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
